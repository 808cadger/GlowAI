version: "3.9"
# GlowAI local dev stack — docker compose up -d

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: glowai
      POSTGRES_PASSWORD: glowai
      POSTGRES_DB: glowai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glowai"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
